<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{

}

<body>

<div class="nav">
<a href="pos.html">البيع</a>
<a href="products.html">المنتجات</a>

</div>

<h2>تقارير المبيعات</h2>

<div class="cards">

<div class="card">
مبيعات اليوم
<br>
<span id="today">0</span>
</div>

<div class="card">
مبيعات الأسبوع
<br>
<span id="week">0</span>
</div>

<div class="card">
عدد الفواتير
<br>
<span id="count">0</span>
</div>

<div class="card">
إجمالي الإيرادات
<br>
<span id="total">0</span>
</div>

</div>

<table>

<thead>
<tr>
<th>رقم الفاتورة</th>
<th>الإجمالي</th>
<th>طريقة الدفع</th>
<th>التاريخ</th>
</tr>
</thead>

<tbody id="sales"></tbody>

</table>

<script>

const { createClient } = supabase;

const db = createClient(
"https://zspikbjjwdnsnzxlqueq.supabase.co",
"sb_publishable_6kOF5m-53TFhOK_hwPRySA_b4kfqiw8"
);

loadReport();

async function loadReport(){

const {data}=await db.from("sales").select("*").order("created_at",{ascending:false});

let today=0;
let week=0;
let total=0;

let todayDate=new Date();
let weekDate=new Date();
weekDate.setDate(todayDate.getDate()-7);

data.forEach(s=>{

let d=new Date(s.created_at);

total+=s.total;

if(d.toDateString()===todayDate.toDateString()){
today+=s.total;
}

if(d>=weekDate){
week+=s.total;
}

});

document.getElementById("today").innerText=today;
document.getElementById("week").innerText=week;
document.getElementById("total").innerText=total;
document.getElementById("count").innerText=data.length;

let html="";

data.slice(0,20).forEach(s=>{

html+=`
<tr>
<td>${s.invoice_number}</td>
<td>${s.total}</td>
<td>${s.payment_method}</td>
<td>${new Date(s.created_at).toLocaleString()}</td>
</tr>
`;

});

document.getElementById("sales").innerHTML=html;

}

</script>

</body>
</html>
```
