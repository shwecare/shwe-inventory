<script>

const db=supabase.createClient(supabaseUrl,supabaseKey)



async function loadReports(){

let from=document.getElementById("fromDate").value
let to=document.getElementById("toDate").value

let query=db.from("sales").select("*").order("created_at",{ascending:false})

if(from){
query=query.gte("created_at",from)
}

if(to){
query=query.lte("created_at",to+"T23:59:59")
}

let {data}=await query

let cash=0
let card=0

let html=""

data.forEach(s=>{

if(s.payment_method=="cash"){
cash+=s.total
}else{
card+=s.total
}

html+=`

<tr>

<td>${s.invoice_number}</td>

<td>${s.total}</td>

<td>${s.payment_method}</td>

<td>${new Date(s.created_at).toLocaleString()}</td>

</tr>

`

})

document.getElementById("cash").innerText=cash
document.getElementById("card").innerText=card
document.getElementById("total").innerText=cash+card
document.getElementById("count").innerText=data.length
document.getElementById("salesTable").innerHTML=html

}

loadReports()

</script>
