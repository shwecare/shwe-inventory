<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<title>تقارير المبيعات</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
direction:rtl;
}

header{
background:#020617;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;

}

.card{
background:#1e293b;
padding:20px;
border-radius:8px;

}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;

}

</style>

</head>

<body>

<header>

<h2>تقارير المبيعات</h2>

<button onclick="location.href='pos.html'">العودة للبيع</button>

</header>


<div class="container">

من

<input type="date" id="from">

إلى

<input type="date" id="to">

<button onclick="loadReport()">عرض التقرير</button>



<div class="cards">

<div class="card">
إجمالي المبيعات
<h2 id="totalSales">0</h2>
</div>

<div class="card">
المبيعات النقدية
<h2 id="cashSales">0</h2>
</div>

<div class="card">
مبيعات الشبكة
<h2 id="cardSales">0</h2>
</div>

<div class="card">
عدد الفواتير
<h2 id="invoiceCount">0</h2>
</div>

</div>



<h3>مبيعات الموظفين</h3>

<table>

<thead>

<tr>
<th>الموظف</th>
<th>عدد الفواتير</th>
<th>إجمالي المبيعات</th>
</tr>

</thead>

<tbody id="employeeSales"></tbody>

</table>



<h3>آخر الفواتير</h3>

<table>

<thead>

<tr>
<th>رقم الفاتورة</th>
<th>الموظف</th>
<th>طريقة الدفع</th>
<th>الإجمالي</th>
</tr>

</thead>

<tbody id="salesTable"></tbody>

</table>

</div>



<script>

const supabaseUrl="https://zspikbjjwdnsnzxlqueq.supabase.co"

const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzcGlrYmpqd2Ruc256eGxxdWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzUyMDIsImV4cCI6MjA4ODkxMTIwMn0.9PErcgM0GhEqB4d3qucoaO7HgmpilFdrvURpBbqpwsI"

const db=supabase.createClient(supabaseUrl,supabaseKey)



async function loadReport(){

let from=document.getElementById("from").value
let to=document.getElementById("to").value

let query=db.from("sales").select("*")

if(from) query=query.gte("created_at",from)

if(to) query=query.lte("created_at",to+"T23:59:59")

let {data,error}=await query

if(error){
console.error(error)
return
}

if(!data) return

let total=0
let cash=0
let card=0

let employees={}

data.forEach(s=>{

total+=s.total

if(s.payment_method==="cash") cash+=s.total
else card+=s.total

if(!employees[s.user_name]){

employees[s.user_name]={count:0,total:0}

}

employees[s.user_name].count++
employees[s.user_name].total+=s.total

})

document.getElementById("totalSales").innerText=total
document.getElementById("cashSales").innerText=cash
document.getElementById("cardSales").innerText=card
document.getElementById("invoiceCount").innerText=data.length



let empHTML=""

for(let name in employees){

empHTML+=`

<tr>
<td>${name}</td>
<td>${employees[name].count}</td>
<td>${employees[name].total}</td>
</tr>

`

}

document.getElementById("employeeSales").innerHTML=empHTML



let salesHTML=""

data.slice(-10).reverse().forEach(s=>{

salesHTML+=`

<tr>
<td>${s.invoice_number}</td>
<td>${s.user_name}</td>
<td>${s.payment_method}</td>
<td>${s.total}</td>
</tr>

`

})

document.getElementById("salesTable").innerHTML=salesHTML

}

loadReport()

</script>

</body>

</html>
