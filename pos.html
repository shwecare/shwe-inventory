<body>

<div class="header">

<div>
<a href="pos.html">البيع</a>
<a href="products.html">المنتجات</a>
<a href="reports.html">التقارير</a>
</div>

</div>

<div class="container">

<div class="invoice">

<h3>الفاتورة</h3>

<div id="cart"></div>

<h3 id="total">الإجمالي: 0</h3>

<select id="payment">

<option value="cash">نقدي</option>
<option value="card">بطاقة</option>

</select>

<button class="green" onclick="finishSale()">إتمام البيع</button>

<button class="red" onclick="clearCart()">تفريغ الفاتورة</button>

</div>

<div class="products">

<h2>المنتجات</h2>

<input id="search"
placeholder="بحث عن منتج"
onkeyup="loadProducts()"
style="width:100%;padding:10px;margin-bottom:20px;border-radius:6px;border:none">

<div class="product-grid" id="products"></div>

</div>

</div>

<script>

const supabaseUrl="https://zspikbjwdnsnzxlqueq.supabase.co"

const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzcGlrYmpqd2Ruc256eGxxdWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzUyMDIsImV4cCI6MjA4ODkxMTIwMn0.9PErcgM0GhEqB4d3qucoaO7HgmpilFdrvURpBbqpwsI"

const db=supabase.createClient(supabaseUrl,supabaseKey)

let products=[]
let cart=[]

async function loadProducts(){

const search=document.getElementById("search").value

let query=db.from("products").select("*")

if(search){
query=query.ilike("name","%"+search+"%")
}

const {data,error}=await query

if(error){
console.log(error)
return
}

products=data || []

let html=""

products.forEach(p=>{

html+=`
<div class="product" onclick="addToCart('${p.id}')">

<h3>${p.name}</h3>

<p>السعر: ${p.price}</p>

<p>المخزون: ${p.stock}</p>

</div>
`

})

document.getElementById("products").innerHTML=html

}

function addToCart(id){

let product=products.find(p=>p.id==id)

let item=cart.find(i=>i.id==id)

if(item){
item.quantity++
}else{

cart.push({
id:product.id,
name:product.name,
price:product.price,
quantity:1
})

}

renderCart()

}

function renderCart(){

let html=""

cart.forEach((item,index)=>{

html+=`

<div class="cartItem">

<div>
${item.name}
</div>

<div>

<button class="qtybtn minus" onclick="changeQty(${index},-1)">-</button>

<span style="margin:0 8px">${item.quantity}</span>

<button class="qtybtn plus" onclick="changeQty(${index},1)">+</button>

</div>

</div>

`

})

document.getElementById("cart").innerHTML=html

updateTotal()

}

function changeQty(index,amount){

cart[index].quantity+=amount

if(cart[index].quantity<=0){
cart.splice(index,1)
}

renderCart()

}

function updateTotal(){

let total=0

cart.forEach(i=>{
total+=i.price*i.quantity
})

document.getElementById("total").innerText="الإجمالي: "+total

}

function clearCart(){

cart=[]
renderCart()

}

async function finishSale(){

if(cart.length==0){
alert("الفاتورة فارغة")
return
}

let total=0

cart.forEach(i=>{
total+=i.price*i.quantity
})

const invoice="INV-"+Date.now()

const {data:sale}=await db
.from("sales")
.insert({
invoice_number:invoice,
total:total,
payment_method:document.getElementById("payment").value
})
.select()
.single()

for(let item of cart){

await db.from("sale_items").insert({
sale_id:sale.id,
product_name:item.name,
price:item.price,
quantity:item.quantity
})

let product=products.find(p=>p.id==item.id)

let newStock=product.stock-item.quantity

await db.from("products")
.update({stock:newStock})
.eq("id",item.id)

}

printInvoice(invoice)

cart=[]
renderCart()

loadProducts()

}

function printInvoice(invoice){

let rows=""

cart.forEach(i=>{

rows+=`
<tr>
<td>${i.name}</td>
<td>${i.quantity}</td>
<td>${i.price}</td>
<td>${i.price*i.quantity}</td>
</tr>
`

})

let html=`

<h2>فاتورة بيع</h2>

<p>رقم الفاتورة: ${invoice}</p>

<table border="1" width="100%" cellpadding="5">

<tr>
<th>المنتج</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>
</tr>

${rows}

</table>

`

let w=window.open("")

w.document.write(html)

w.print()

}

loadProducts()

</script>

</body>

</html>
