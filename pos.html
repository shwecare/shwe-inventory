<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>POS نظام البيع</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
direction:rtl;
background:#0f172a;
color:white;
margin:0;
}

.container{
display:flex;
height:100vh;
}

.left{
width:30%;
background:#1e293b;
padding:20px;
}

.right{
flex:1;
padding:20px;
}

.product{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:10px;
cursor:pointer;
display:inline-block;
width:150px;
text-align:center;
}

.product:hover{
background:#334155;
}

button{
padding:12px 20px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

input{
width:100%;
padding:10px;
margin-bottom:20px;
border-radius:6px;
border:none;
font-size:16px;
}

.cart-item{
background:#0f172a;
padding:10px;
margin:8px 0;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h2>الفاتورة</h2>

<div id="cart"></div>

<h3 id="total">الإجمالي: 0</h3>

<select id="payment">

<option value="cash">نقدي</option>
<option value="card">بطاقة</option>

</select>

<br><br>

<button onclick="finishSale()">إتمام البيع</button>

</div>


<div class="right">

<h2>المنتجات</h2>

<input id="search" placeholder="بحث عن منتج">

<div id="products"></div>

</div>

</div>


<script>

const SUPABASE_URL = "https://zspikbjjwdnsnzxlqueq.supabase.co"
const SUPABASE_KEY = "sb_publishable_6kOF5m-53TFhOK_hwPRySA_b4kfqiw8"

const client = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let products=[]
let cart=[]


async function loadProducts(){

const {data,error}=await client
.from("products")
.select("*")

if(error){
console.log(error)
return
}

products=data

renderProducts(data)

}


function renderProducts(list){

let html=""

list.forEach(p=>{

html+=`
<div class="product" onclick="addToCart('${p.name}',${p.price})">

${p.name}
<br>
${p.price}

</div>
`

})

document.getElementById("products").innerHTML=html

}


document.getElementById("search").addEventListener("input",function(){

let value=this.value

let filtered=products.filter(p=>p.name.includes(value))

renderProducts(filtered)

})


function addToCart(name,price){

let item=cart.find(i=>i.name===name)

if(item){

item.qty++

}else{

cart.push({
name:name,
price:price,
qty:1
})

}

renderCart()

}


function renderCart(){

let html=""
let total=0

cart.forEach(i=>{

total+=i.price*i.qty

html+=`
<div class="cart-item">

${i.name}

<br>

${i.qty} × ${i.price}

</div>
`

})

document.getElementById("cart").innerHTML=html
document.getElementById("total").innerText="الإجمالي: "+total

}


async function finishSale(){

if(cart.length===0){

alert("السلة فارغة")
return

}

let total=0

cart.forEach(i=>{
total+=i.price*i.qty
})

let payment=document.getElementById("payment").value

let invoice="INV-"+Date.now()


const { data, error } = await client
.from("sales")
.insert([{
invoice_number:invoice,
total:total,
payment_method:payment
}])
.select()
.single()

if(error){

console.log(error)
alert("فشل حفظ الفاتورة")
return

}

let sale_id=data.id


for(let item of cart){

await client
.from("sale_items")
.insert([{

sale_id:sale_id,
product_name:item.name,
price:item.price,
quantity:item.qty

}])

}


alert("تم البيع\nرقم الفاتورة: "+invoice)

cart=[]
renderCart()

}


loadProducts()

</script>

</body>
</html>
