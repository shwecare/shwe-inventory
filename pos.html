<body>

<input id="barcodeInput" autofocus style="position:absolute;opacity:0;">

<div class="products">

<h2>المنتجات</h2>

<input class="search" id="search" placeholder="بحث عن منتج" onkeyup="searchProduct()">

<div class="grid" id="products"></div>

</div>

<div class="invoice">

<h2>الفاتورة</h2>

<div id="cart"></div>

<h3>الإجمالي: <span id="total">0</span></h3>

<select id="payment">
<option value="cash">نقدي</option>
<option value="card">بطاقة</option>
</select>

<button onclick="finishSale()">إتمام البيع</button>

<button class="clear" onclick="clearCart()">تفريغ الفاتورة</button>

</div>

<script>

const { createClient } = supabase;

const db = createClient(
"https://zspikbjjwdnsnzxlqueq.supabase.co",
"sb_publishable_6kOF5m-53TFhOK_hwPRySA_b4kfqiw8"
);

let products=[];
let cart=[];
let total=0;
let store={};

loadProducts();
loadStore();

async function loadStore(){

const {data}=await db
.from("store_settings")
.select("*")
.limit(1)
.single();

store=data;

}

async function loadProducts(){

const {data}=await db
.from("products")
.select("*");

products=data;

renderProducts(products);

}

function renderProducts(list){

let html="";

list.forEach(p=>{

html+=`
<div class="product" onclick="addToCart('${p.id}')">
${p.name}
<br>
السعر: ${p.price}
<br>
المخزون: ${p.stock}
</div>
`;

});

document.getElementById("products").innerHTML=html;

}

function searchProduct(){

let text=document.getElementById("search").value.toLowerCase();

let filtered=products.filter(p=>
p.name.toLowerCase().includes(text)
);

renderProducts(filtered);

}

function addToCart(id){

let product=products.find(p=>p.id===id);

if(product.stock<=0){
alert("المنتج غير متوفر");
return;
}

let item=cart.find(i=>i.id===id);

if(item){
item.quantity++;
}else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
quantity:1
});
}

renderCart();

}

function increaseQty(id){

let item=cart.find(i=>i.id===id);
item.quantity++;

renderCart();

}

function decreaseQty(id){

let item=cart.find(i=>i.id===id);

item.quantity--;

if(item.quantity<=0){
cart=cart.filter(i=>i.id!==id);
}

renderCart();

}

function removeItem(id){

cart=cart.filter(i=>i.id!==id);
renderCart();

}

function clearCart(){

cart=[];
renderCart();

}

function renderCart(){

let html="";
total=0;

cart.forEach(item=>{

let sum=item.price*item.quantity;

total+=sum;

html+=`
<div class="item">

<span>${item.name}</span>

<div class="qty">

<button onclick="increaseQty('${item.id}')">+</button>

<span>${item.quantity}</span>

<button onclick="decreaseQty('${item.id}')">-</button>

<span class="remove" onclick="removeItem('${item.id}')">✖</span>

</div>

</div>
`;

});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText=total;

}

async function finishSale(){

if(cart.length==0){
alert("السلة فارغة");
return;
}

let invoice="INV-"+Date.now();
let payment=document.getElementById("payment").value;

const {data:sale}=await db
.from("sales")
.insert({
invoice_number:invoice,
total:total,
payment_method:payment
})
.select()
.single();

for(let item of cart){

await db
.from("sale_items")
.insert({
sale_id:sale.id,
product_name:item.name,
price:item.price,
quantity:item.quantity
});

const {data:product}=await db
.from("products")
.select("*")
.eq("id",item.id)
.single();

let newStock=(product.stock || 0)-item.quantity;

await db
.from("products")
.update({stock:newStock})
.eq("id",product.id);

}

printInvoice(invoice);

cart=[];
renderCart();
loadProducts();

alert("تم البيع");

}

function printInvoice(invoice){

let rows="";

cart.forEach(item=>{

rows+=`
<tr>
<td>${item.name}</td>
<td>${item.quantity}</td>
<td>${item.price}</td>
<td>${item.price*item.quantity}</td>
</tr>
`;

});

let win=window.open();

win.document.write(`

<html dir="rtl">

<head>

<style>

body{
font-family:Arial;
width:220px;
margin:auto;
text-align:center;
font-size:12px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border-bottom:1px dashed black;
padding:4px;
}

</style>

</head>

<body>

<h2>${store.store_name}</h2>

<p>${store.store_address}</p>

<p>${store.store_phone}</p>

<hr>

<p>فاتورة بيع</p>

<p>${invoice}</p>

<p>${new Date().toLocaleString()}</p>

<table>

<tr>
<th>المنتج</th>
<th>ك</th>
<th>س</th>
<th>ج</th>
</tr>

${rows}

</table>

<h3>الإجمالي: ${total}</h3>

<hr>

<p>${store.receipt_message}</p>

</body>

</html>

`);

win.document.close();

setTimeout(()=>{
win.print();
},500);

}

/* قارئ الباركود */

let barcodeBuffer="";

document.addEventListener("keypress",async function(e){

if(e.key==="Enter"){

let code=barcodeBuffer;
barcodeBuffer="";

if(code==="") return;

const {data}=await db
.from("products")
.select("*")
.eq("barcode",code)
.single();

if(data){
addToCart(data.id);
}

}else{

barcodeBuffer+=e.key;

}

});

</script>

</body>
</html>
