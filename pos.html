<script>

const supabaseUrl="https://zspikbjjwdnsnzxlqueq.supabase.co"

const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzcGlrYmpqd2Ruc256eGxxdWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzUyMDIsImV4cCI6MjA4ODkxMTIwMn0.9PErcgM0GhEqB4d3qucoaO7HgmpilFdrvURpBbqpwsI"

const db=supabase.createClient(supabaseUrl,supabaseKey)

let products=[]
let cart=[]



async function loadProducts(){

const search=document.getElementById("search").value

let query=db.from("products").select("*")

if(search) query=query.ilike("name","%"+search+"%")

let {data}=await query

products=data || []

renderProducts()

}



function renderProducts(){

let html=""

products.forEach(p=>{

html+=`

<div class="product" onclick="addToCart('${p.id}')">

<b>${p.name}</b><br>

السعر: ${p.price}<br>

المخزون: ${p.stock}

</div>

`

})

document.getElementById("products").innerHTML=html

}



function addToCart(id){

let product=products.find(p=>p.id==id)

let item=cart.find(i=>i.id==id)

if(item){

item.quantity++

}else{

cart.push({
id:product.id,
name:product.name,
price:product.price,
quantity:1
})

}

renderCart()

}



function renderCart(){

let html=""
let total=0

cart.forEach((i,index)=>{

let sub=i.price*i.quantity
total+=sub

html+=`

<div class="cartItem">

${i.name}

<div>

<button class="qtybtn minus" onclick="changeQty(${index},-1)">-</button>

${i.quantity}

<button class="qtybtn plus" onclick="changeQty(${index},1)">+</button>

</div>

</div>

`

})

document.getElementById("cart").innerHTML=html
document.getElementById("total").innerText=total

}



function changeQty(index,amount){

cart[index].quantity+=amount

if(cart[index].quantity<=0){

cart.splice(index,1)

}

renderCart()

}



function clearCart(){

cart=[]
renderCart()

}



async function completeSale(){

if(cart.length==0) return

let total=cart.reduce((s,i)=>s+i.price*i.quantity,0)

let payment=document.getElementById("payment").value

let invoice="INV-"+Date.now()

let saleData={
invoice:invoice,
total:total,
payment:payment,
items:cart
}

if(navigator.onLine){

await sendSaleToServer(saleData)

}else{

saveOfflineSale(saleData)

}

printInvoice(invoice)

cart=[]
renderCart()
loadProducts()

}



function saveOfflineSale(sale){

let sales=JSON.parse(localStorage.getItem("offline_sales")||"[]")

sales.push(sale)

localStorage.setItem("offline_sales",JSON.stringify(sales))

}



async function sendSaleToServer(sale){

await db.from("sales").insert({
invoice_number:sale.invoice,
total:sale.total,
payment_method:sale.payment
})

for(let item of sale.items){

await db.from("sale_items").insert({
invoice_number:sale.invoice,
product_id:item.id,
quantity:item.quantity,
price:item.price
})

}

}



window.addEventListener("online",syncOfflineSales)



async function syncOfflineSales(){

let sales=JSON.parse(localStorage.getItem("offline_sales")||"[]")

if(sales.length==0) return

for(let sale of sales){

await sendSaleToServer(sale)

}

localStorage.removeItem("offline_sales")

}



function printInvoice(invoice){

let rows=""
let total=0

cart.forEach(i=>{

let sub=i.price*i.quantity
total+=sub

rows+=`

<tr>
<td>${i.name}</td>
<td>${i.quantity}</td>
<td>${sub}</td>
</tr>

`

})

let html=`

<html>

}

</style>

</head>

<body>

<h3>SHWE CARE</h3>

فاتورة بيع

<br>

${invoice}

<hr>

<table>

<tr>
<th>منتج</th>
<th>ك</th>
<th>ج</th>
</tr>

${rows}

</table>

<hr>

الإجمالي

${total}

<br><br>

شكراً لزيارتكم

</body>

</html>

`

let w=window.open("")
w.document.write(html)
w.print()

}



if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js")

}



loadProducts()

</script>
