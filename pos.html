<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>POS نظام البيع</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
direction:rtl;
}

.container{
display:flex;
height:100vh;
}

.products{
flex:2;
padding:20px;
}

.invoice{
flex:1;
background:#1e293b;
padding:20px;
}

.search{
width:100%;
padding:10px;
margin-bottom:20px;
border-radius:6px;
border:none;
}

.product{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:8px;
cursor:pointer;
text-align:center;
display:inline-block;
width:160px;
}

.cart-item{
background:#0f172a;
padding:10px;
margin:5px 0;
border-radius:6px;
}

.pay{
background:#22c55e;
color:white;
padding:12px;
width:100%;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="products">

<h2>المنتجات</h2>

<input class="search" id="search" placeholder="بحث عن منتج">

<div id="productList"></div>

</div>

<div class="invoice">

<h2>الفاتورة</h2>

<div id="cart"></div>

<h3>الإجمالي: <span id="total">0</span></h3>

<select id="payment">
<option value="cash">نقدي</option>
<option value="card">بطاقة</option>
</select>

<button class="pay" onclick="finishSale()">إتمام البيع</button>

</div>

</div>

<script>

const { createClient } = supabase;

const db = createClient(
"https://zspikbjjwdnsnzxlqueq.supabase.co",
"sb_publishable_6kOF5m-53TFhOK_hwPRySA_b4kfqiw8"
);

let products=[];
let cart=[];
let total=0;

loadProducts();

async function loadProducts(){

const {data}=await db
.from("products")
.select("*");

products=data;

renderProducts(products);

}

function renderProducts(list){

const container=document.getElementById("productList");

container.innerHTML="";

list.forEach(p=>{

container.innerHTML+=`
<div class="product" onclick='addToCart(${JSON.stringify(p)})'>
${p.name}
<br>
${p.price}
</div>
`;

});

}

function addToCart(product){

let item=cart.find(i=>i.id===product.id);

if(item){

item.quantity++;

}else{

cart.push({
id:product.id,
name:product.name,
price:product.price,
quantity:1
});

}

renderCart();

}

function renderCart(){

const container=document.getElementById("cart");

container.innerHTML="";

total=0;

cart.forEach(item=>{

total+=item.price*item.quantity;

container.innerHTML+=`
<div class="cart-item">
${item.name} × ${item.quantity}
</div>
`;

});

document.getElementById("total").innerText=total;

}

async function finishSale(){

if(cart.length==0){
alert("لا توجد منتجات");
return;
}

const invoiceNumber="INV-"+Date.now();

const payment=document.getElementById("payment").value;

const {data,error}=await db
.from("sales")
.insert([{
invoice_number:invoiceNumber,
total:total,
payment_method:payment
}])
.select();

if(error){

alert("فشل حفظ الفاتورة");
return;

}

const saleId=data[0].id;

let items=[];

cart.forEach(item=>{

items.push({
sale_id:saleId,
product_name:item.name,
price:item.price,
quantity:item.quantity
});

});

await db
.from("sale_items")
.insert(items);

alert("تم البيع\nرقم الفاتورة: "+invoiceNumber);

printInvoice(invoiceNumber);

cart=[];
renderCart();

}

function printInvoice(invoiceNumber){

let rows="";

cart.forEach(item=>{

rows+=`
<tr>
<td>${item.name}</td>
<td>${item.quantity}</td>
<td>${item.price}</td>
<td>${item.price*item.quantity}</td>
</tr>
`;

});

let win=window.open("","","width=400");

win.document.write(`

<html dir="rtl">

<head>

<title>فاتورة</title>

<style>

body{
font-family:Arial;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid black;
padding:6px;
}

</style>

</head>

<body>

<h2>فاتورة بيع</h2>

<p>رقم الفاتورة: ${invoiceNumber}</p>

<p>${new Date().toLocaleString()}</p>

<table>

<tr>
<th>المنتج</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>
</tr>

${rows}

</table>

<h3>الإجمالي: ${total}</h3>

</body>

</html>

`);

win.print();

}

</script>

</body>
</html>
