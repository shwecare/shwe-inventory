```html
<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<title>نظام البيع POS</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
direction:rtl;
}

header{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav button{
margin:5px;
padding:10px 20px;
background:#1e293b;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.logout{
background:#ef4444;
}

.container{
display:flex;
height:90vh;
}

.products{
flex:2;
padding:20px;
}

.invoice{
flex:1;
background:#1e293b;
padding:20px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.product{
background:#334155;
padding:20px;
border-radius:8px;
cursor:pointer;
text-align:center;
}

button.sell{
background:#22c55e;
width:100%;
padding:12px;
border:none;
border-radius:6px;
color:white;
margin-top:10px;
}

button.clear{
background:#ef4444;
width:100%;
padding:12px;
border:none;
border-radius:6px;
color:white;
margin-top:10px;
}

.cartItem{
display:flex;
justify-content:space-between;
margin-bottom:10px;
background:#0f172a;
padding:6px;
border-radius:6px;
}

.qtybtn{
border:none;
padding:3px 8px;
color:white;
border-radius:4px;
}

.minus{background:#ef4444;}
.plus{background:#22c55e;}

.user{
font-size:14px;
opacity:0.8;
}

</style>

</head>

<body>

<header>

<div>

<nav>

<button onclick="location.href='pos.html'">البيع</button>
<button onclick="location.href='products.html'">المنتجات</button>
<button onclick="location.href='reports.html'">التقارير</button>

<button id="staffBtn" onclick="location.href='staff.html'" style="display:none">
الموظفين
</button>

</nav>

</div>

<div>

<span class="user" id="username"></span>

<button class="logout" onclick="logout()">تسجيل الخروج</button>

</div>

</header>


<div class="container">


<div class="products">

<h2>المنتجات</h2>

<input id="search"
placeholder="بحث عن منتج"
onkeyup="loadProducts()"
style="width:100%;padding:10px;margin-bottom:20px">

<div id="products" class="product-grid"></div>

</div>



<div class="invoice">

<h2>الفاتورة</h2>

<div id="cart"></div>

<h3>الإجمالي: <span id="total">0</span></h3>

<select id="payment">

<option value="cash">نقدي</option>
<option value="card">بطاقة</option>

</select>

<button class="sell" onclick="completeSale()">إتمام البيع</button>

<button class="clear" onclick="clearCart()">تفريغ الفاتورة</button>

</div>

</div>



<script>

if(!localStorage.getItem("role")){
window.location.href="login.html"
}

document.getElementById("username").innerText=
"المستخدم: "+localStorage.getItem("user_name")

// إظهار زر الموظفين
let role = localStorage.getItem("role")

if(role === "owner" || role === "manager"){
document.getElementById("staffBtn").style.display="inline-block"
}

function logout(){
localStorage.clear()
window.location.href="login.html"
}

const supabaseUrl="https://zspikbjjwdnsnzxlqueq.supabase.co"
const supabaseKey="ضع_المفتاح_هنا"
const db=supabase.createClient(supabaseUrl,supabaseKey)

let products=[]
let cart=[]

async function loadProducts(){

const search=document.getElementById("search").value

let query=db.from("products").select("*")

if(search) query=query.ilike("name","%"+search+"%")

let {data}=await query

products=data || []

renderProducts()

}

function renderProducts(){

let html=""

products.forEach(p=>{

html+=`

<div class="product" onclick="addToCart('${p.id}')">
<b>${p.name}</b><br>
السعر: ${p.price}<br>
المخزون: ${p.stock}
</div>

`

})

document.getElementById("products").innerHTML=html

}

function addToCart(id){

let product=products.find(p=>p.id==id)

let item=cart.find(i=>i.id==id)

if(item){
item.quantity++
}else{
cart.push({id:product.id,name:product.name,price:product.price,quantity:1})
}

renderCart()

}

function renderCart(){

let html=""
let total=0

cart.forEach((i,index)=>{

let sub=i.price*i.quantity
total+=sub

html+=`

<div class="cartItem">
${i.name}
<div>
<button class="qtybtn minus" onclick="changeQty(${index},-1)">-</button>
${i.quantity}
<button class="qtybtn plus" onclick="changeQty(${index},1)">+</button>
</div>
</div>

`

})

document.getElementById("cart").innerHTML=html
document.getElementById("total").innerText=total

}

function changeQty(index,amount){

cart[index].quantity+=amount

if(cart[index].quantity<=0){
cart.splice(index,1)
}

renderCart()

}

function clearCart(){
cart=[]
renderCart()
}

async function completeSale(){

if(cart.length==0) return

let total=cart.reduce((s,i)=>s+i.price*i.quantity,0)

let payment=document.getElementById("payment").value

let invoice="INV-"+Date.now()

await db.from("sales").insert({
invoice_number:invoice,
total:total,
payment_method:payment,
user_id:localStorage.getItem("user_id"),
user_name:localStorage.getItem("user_name"),
branch_id:localStorage.getItem("branch")
})

cart=[]
renderCart()
loadProducts()

}

loadProducts()

</script>

</body>

</html>
