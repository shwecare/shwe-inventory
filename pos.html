```html
<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<title>نظام البيع POS</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
direction:rtl;
}

.nav{
background:#020617;
padding:10px;
display:flex;
gap:20px;
position:fixed;
top:0;
width:100%;
}

.nav a{
color:white;
text-decoration:none;
background:#1e293b;
padding:8px 16px;
border-radius:6px;
}

.products{
flex:2;
padding:80px 20px 20px 20px;
}

.invoice{
flex:1;
background:#1e293b;
padding:80px 20px 20px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.product{
background:#1e293b;
padding:30px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.item{
background:#0f172a;
padding:10px;
margin-bottom:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
}

button{
background:#22c55e;
border:none;
padding:14px;
width:100%;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.clear{
background:#ef4444;
}

.search{
width:100%;
padding:10px;
margin-bottom:20px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<div class="nav">
<a href="pos.html">البيع</a>
<a href="products.html">المنتجات</a>
<a href="reports.html">التقارير</a>
</div>

<div class="products">

<h2>المنتجات</h2>

<input class="search" id="search" placeholder="بحث عن منتج" onkeyup="searchProduct()">

<div class="grid" id="products"></div>

</div>

<div class="invoice">

<h2>الفاتورة</h2>

<div id="cart"></div>

<h3>الإجمالي: <span id="total">0</span></h3>

<button onclick="finishSale()">إتمام البيع</button>

<button class="clear" onclick="clearCart()">تفريغ الفاتورة</button>

</div>

<script>

const { createClient } = supabase;

const db = createClient(
"https://zspikbjjwdnsnzxlqueq.supabase.co",
"sb_publishable_6kOF5m-53TFhOK_hwPRySA_b4kfqiw8"
);

let products=[];
let cart=[];
let total=0;

loadProducts();

async function loadProducts(){

const {data}=await db
.from("products")
.select("*");

products=data;

renderProducts(products);

}

function renderProducts(list){

let html="";

list.forEach(p=>{

html+=`
<div class="product" onclick="addToCart('${p.id}')">
${p.name}<br>
السعر: ${p.price}<br>
المخزون: ${p.stock}
</div>
`;

});

document.getElementById("products").innerHTML=html;

}

function searchProduct(){

let text=document.getElementById("search").value.toLowerCase();

let filtered=products.filter(p=>p.name.toLowerCase().includes(text));

renderProducts(filtered);

}

function addToCart(id){

let product=products.find(p=>p.id===id);

let item=cart.find(i=>i.id===id);

if(item){

item.quantity++;

}else{

cart.push({
id:product.id,
name:product.name,
price:product.price,
quantity:1
});

}

renderCart();

}

function renderCart(){

let html="";
total=0;

cart.forEach(item=>{

total+=item.price*item.quantity;

html+=`
<div class="item">
${item.name} x ${item.quantity}
</div>
`;

});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText=total;

}

function clearCart(){

cart=[];
renderCart();

}

async function finishSale(){

if(cart.length===0){
alert("السلة فارغة");
return;
}

let invoice="INV-"+Date.now();

await db.from("sales").insert({

invoice_number:invoice,
total:total,
payment_method:"cash"

});

cart=[];
renderCart();

alert("تم البيع");

}

</script>

</body>
</html>
