<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>POS نظام البيع</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
direction:rtl;
background:#0f172a;
color:white;
margin:0;
}

.container{
display:flex;
height:100vh;
}

.left{
width:30%;
background:#1e293b;
padding:20px;
}

.right{
flex:1;
padding:20px;
}

.product{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:10px;
cursor:pointer;
display:inline-block;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

</style>
</head>

<body>

<div class="container">

<div class="left">

<h2>الفاتورة</h2>

<div id="cart"></div>

<h3 id="total">الإجمالي: 0</h3>

<select id="payment">

<option value="cash">نقدي</option>
<option value="card">بطاقة</option>

</select>

<br><br>

<button onclick="finishSale()">إتمام البيع</button>

</div>

<div class="right">

<h2>المنتجات</h2>

<input id="search" placeholder="بحث">

<div id="products"></div>

</div>

</div>

<script>

const SUPABASE_URL="YOUR_URL"
const SUPABASE_KEY="YOUR_KEY"

const supabase = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let cart=[]

async function loadProducts(){

const {data}=await supabase
.from("products")
.select("*")

let html=""

data.forEach(p=>{

html+=`
<div class="product" onclick="addToCart('${p.name}',${p.price})">
${p.name}
<br>
${p.price}
</div>
`

})

document.getElementById("products").innerHTML=html

}

function addToCart(name,price){

let item=cart.find(i=>i.name==name)

if(item){

item.qty++

}else{

cart.push({
name:name,
price:price,
qty:1
})

}

renderCart()

}

function renderCart(){

let html=""
let total=0

cart.forEach(i=>{

total+=i.price*i.qty

html+=`
<div>
${i.name} - ${i.qty}
</div>
`

})

document.getElementById("cart").innerHTML=html
document.getElementById("total").innerText="الإجمالي: "+total

}

async function finishSale(){

if(cart.length==0){

alert("السلة فارغة")
return

}

let total=0

cart.forEach(i=>{
total+=i.price*i.qty
})

const payment=document.getElementById("payment").value

const invoice="INV-"+Date.now()

const {data:sale}=await supabase
.from("sales")
.insert([{
invoice_number:invoice,
total:total,
payment_method:payment
}])
.select()

const sale_id=sale[0].id

for(let item of cart){

await supabase
.from("sale_items")
.insert([{
sale_id:sale_id,
product_name:item.name,
price:item.price,
quantity:item.qty
}])

}

alert("تم البيع\nرقم الفاتورة: "+invoice)

cart=[]
renderCart()

}

loadProducts()

</script>

</body>
</html>
