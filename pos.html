<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>نظام البيع</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
direction:rtl;
}

.products{
flex:2;
padding:20px;
}

.invoice{
flex:1;
background:#1e293b;
padding:20px;
}

.search{
width:100%;
padding:10px;
border:none;
border-radius:6px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.product{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.product:hover{
background:#334155;
}

.item{
background:#0f172a;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

button{
background:#22c55e;
border:none;
padding:12px;
width:100%;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
}

</style>

</head>

<body>

<div class="products">

<h2>المنتجات</h2>

<input class="search" id="search" placeholder="بحث عن منتج">

<div class="grid" id="products"></div>

</div>

<div class="invoice">

<h2>الفاتورة</h2>

<div id="cart"></div>

<h3>الإجمالي: <span id="total">0</span></h3>

<select id="payment">
<option value="cash">نقدي</option>
<option value="card">بطاقة</option>
</select>

<button onclick="finishSale()">إتمام البيع</button>

</div>

<script>

const { createClient } = supabase;

const db=createClient(
"https://zspikbjjwdnsnzxlqueq.supabase.co",
"sb_publishable_6kOF5m-53TFhOK_hwPRySA_b4kfqiw8"
);

let products=[];
let cart=[];
let total=0;
let store={};

loadProducts();
loadStore();

async function loadStore(){

const {data}=await db
.from("store_settings")
.select("*")
.limit(1)
.single();

store=data;

}

async function loadProducts(){

const {data}=await db
.from("products")
.select("*");

products=data;

renderProducts(data);

}

function renderProducts(list){

let html="";

list.forEach(p=>{

html+=`
<div class="product" onclick="addToCart('${p.name}',${p.price})">
${p.name}
<br>
${p.price}
</div>
`;

});

document.getElementById("products").innerHTML=html;

}

function addToCart(name,price){

let item=cart.find(i=>i.name===name);

if(item){

item.quantity++;

}else{

cart.push({
name:name,
price:price,
quantity:1
});

}

renderCart();

}

function renderCart(){

let html="";
total=0;

cart.forEach(item=>{

let sum=item.price*item.quantity;

total+=sum;

html+=`
<div class="item">
${item.name} × ${item.quantity}
</div>
`;

});

document.getElementById("cart").innerHTML=html;

document.getElementById("total").innerText=total;

}

async function finishSale(){

if(cart.length==0){

alert("السلة فارغة");

return;

}

let invoice="INV-"+Date.now();

let payment=document.getElementById("payment").value;

const {data:sale}=await db
.from("sales")
.insert({

invoice_number:invoice,
total:total,
payment_method:payment

})
.select()
.single();

for(let item of cart){

await db
.from("sale_items")
.insert({

sale_id:sale.id,
product_name:item.name,
price:item.price,
quantity:item.quantity

});

}

printInvoice(invoice);

cart=[];
renderCart();

alert("تم البيع");

}

function printInvoice(invoice){

let rows="";

cart.forEach(item=>{

rows+=`
<tr>
<td>${item.name}</td>
<td>${item.quantity}</td>
<td>${item.price}</td>
<td>${item.price*item.quantity}</td>
</tr>
`;

});

let win=window.open();

win.document.write(`

<html dir="rtl">

<head>

<style>

body{
font-family:Arial;
width:220px;
margin:auto;
text-align:center;
font-size:12px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border-bottom:1px dashed black;
padding:4px;
}

</style>

</head>

<body>

<h2>${store.store_name}</h2>

<p>${store.store_address}</p>

<p>${store.store_phone}</p>

<hr>

<p>فاتورة بيع</p>

<p>${invoice}</p>

<p>${new Date().toLocaleString()}</p>

<table>

<tr>
<th>المنتج</th>
<th>ك</th>
<th>س</th>
<th>ج</th>
</tr>

${rows}

</table>

<h3>الإجمالي: ${total}</h3>

<hr>

<p>${store.receipt_message}</p>

</body>

</html>

`);

win.document.close();

setTimeout(()=>{
win.print();
},500);

}

</script>

</body>
</html>
