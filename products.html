<!DOCTYPE html>

<head>

<meta charset="UTF-8">
<title>إدارة المنتجات</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;

direction:rtl;
}

header{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav button{
margin:5px;

}

.logout{background:#ef4444;}

.container{padding:20px;}

input{
padding:10px;

}

button{
padding:8px 12px;

}

.add{background:#22c55e;color:white;}
.edit{background:#3b82f6;color:white;}
.delete{background:#ef4444;color:white;}

.product{
background:#1e293b;

}

</style>

</head>

<body>

<header>

<nav>

<button onclick="location.href='pos.html'">البيع</button>
<button onclick="location.href='products.html'">المنتجات</button>
<button onclick="location.href='reports.html'">التقارير</button>

<button id="staffBtn" style="display:none" onclick="location.href='staff.html'">
الموظفين
</button>

</nav>

<div>
<span id="username" class="user"></span>
<button class="logout" onclick="logout()">تسجيل الخروج</button>
</div>

</header>

<div class="container">

<h2>إضافة منتج</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="stock" placeholder="المخزون">

<button id="addBtn" class="add" onclick="addProduct()" style="display:none">
إضافة منتج
</button>

<hr>

<h2>قائمة المنتجات</h2>

<div id="list"></div>

</div>

<script>

/* حماية */
if(!localStorage.getItem("role")){
window.location.href="login.html"
}

let role = localStorage.getItem("role")
let branch = localStorage.getItem("branch")

document.getElementById("username").innerText =
"المستخدم: " + localStorage.getItem("user_name")

function logout(){
localStorage.clear()
window.location.href="login.html"
}

/* Supabase */
const supabaseUrl="https://zspikbjjwdnsnzxlqueq.supabase.co"
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
const db=supabase.createClient(supabaseUrl,supabaseKey)

/* الصلاحيات */
if(role==="owner" || role==="manager"){
document.getElementById("addBtn").style.display="inline-block"
document.getElementById("staffBtn").style.display="inline-block"
}

/* تحميل */
async function loadProducts(){

let query = db.from("products").select("*")

// المدير يشوف فرعه فقط
if(role==="manager"){
query = query.eq("branch_id",branch)
}

let {data}=await query

let html=""

data.forEach(p=>{

html+=`
<div class="product">

<div>
<b>${p.name}</b><br>
السعر: ${p.price}<br>
المخزون: ${p.stock}
</div>

<div>

${(role==="owner" || role==="manager") ? `
<button class="edit" onclick="editPrice('${p.id}',${p.price})">تعديل</button>
<button class="delete" onclick="deleteProduct('${p.id}')">حذف</button>
` : ""}

</div>

</div>
`

})

document.getElementById("list").innerHTML=html

}

/* إضافة */
async function addProduct(){

if(role!=="owner" && role!=="manager"){
alert("غير مصرح")
return
}

let name=document.getElementById("name").value
let price=document.getElementById("price").value
let stock=document.getElementById("stock").value

await db.from("products").insert({
name:name,
price:price,
stock:stock,
branch_id: branch
})

loadProducts()

}

/* تعديل */
async function editPrice(id,current){

let newPrice=prompt("السعر الجديد",current)

if(!newPrice) return

await db.from("products")
.update({price:newPrice})
.eq("id",id)

loadProducts()

}

/* حذف */
async function deleteProduct(id){

if(!confirm("حذف المنتج؟")) return

await db.from("products").delete().eq("id",id)

loadProducts()

}

/* تشغيل */
loadProducts()

</script>

</body>

</html>
