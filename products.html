<body>

<h2>إدارة المنتجات</h2>

<h3>إضافة منتج</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="stock" placeholder="المخزون">
<input id="barcode" placeholder="الباركود">

<button onclick="addProduct()">إضافة</button>

<h3>قائمة المنتجات</h3>

<table>

<thead>
<tr>
<th>الاسم</th>
<th>السعر</th>
<th>المخزون</th>
<th>الباركود</th>
<th>حفظ</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="products"></tbody>

</table>

<script>

const { createClient } = supabase;

const db = createClient(
"https://zspikbjjwdnsnzxlqueq.supabase.co",
"sb_publishable_6kOF5m-53TFhOK_hwPRySA_b4kfqiw8"
);

loadProducts();

async function loadProducts(){

const {data}=await db
.from("products")
.select("*");

let html="";

data.forEach(p=>{

html+=`
<tr>

<td>
<input value="${p.name}" id="name_${p.id}">
</td>

<td>
<input value="${p.price}" id="price_${p.id}">
</td>

<td>
<input value="${p.stock}" id="stock_${p.id}">
</td>

<td>
<input value="${p.barcode ?? ""}" id="barcode_${p.id}">
</td>

<td>
<button onclick="saveProduct('${p.id}')">حفظ</button>
</td>

<td>
<button class="delete" onclick="deleteProduct('${p.id}')">حذف</button>
</td>

</tr>
`;

});

document.getElementById("products").innerHTML=html;

}

async function addProduct(){

await db
.from("products")
.insert({

name:document.getElementById("name").value,
price:document.getElementById("price").value,
stock:document.getElementById("stock").value,
barcode:document.getElementById("barcode").value

});

loadProducts();

}

async function saveProduct(id){

await db
.from("products")
.update({

name:document.getElementById("name_"+id).value,
price:document.getElementById("price_"+id).value,
stock:document.getElementById("stock_"+id).value,
barcode:document.getElementById("barcode_"+id).value

})
.eq("id",id);

alert("تم التحديث");

}

async function deleteProduct(id){

await db
.from("products")
.delete()
.eq("id",id);

loadProducts();

}

</script>

</body>
</html>
