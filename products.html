```html
<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<title>إدارة المنتجات</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
direction:rtl;
}

.container{
padding:20px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.add{
background:#22c55e;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>إضافة منتج</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="stock" placeholder="المخزون">

<button id="addBtn" class="add" onclick="addProduct()" style="display:none">
إضافة منتج
</button>

</div>

<script>

const supabaseUrl="https://zspikbjjwdnsnzxlqueq.supabase.co"
const supabaseKey="ضع_المفتاح_هنا"
const db=supabase.createClient(supabaseUrl,supabaseKey)

let role = localStorage.getItem("role")

// إظهار الزر حسب الصلاحية
if(role === "owner" || role === "manager"){
document.getElementById("addBtn").style.display="inline-block"
}

async function addProduct(){

let role = localStorage.getItem("role")

if(role !== "owner" && role !== "manager"){
alert("غير مصرح")
return
}

let name=document.getElementById("name").value
let price=document.getElementById("price").value
let stock=document.getElementById("stock").value

await db.from("products").insert({
name:name,
price:price,
stock:stock
})

alert("تمت الإضافة")

}

</script>

</body>

</html>
```
