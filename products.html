<!DOCTYPE html>

<html lang="ar">

<head>
<meta charset="UTF-8">
<title>إدارة المنتجات</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#0f172a;
color:white;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
width:200px;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#16a34a;
}

.product{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>إدارة المنتجات</h1>

<h3>إضافة منتج</h3>

<input id="name" placeholder="اسم المنتج">
<input id="barcode" placeholder="الباركود">
<input id="price" placeholder="السعر">

<br><br>

<button onclick="addProduct()">إضافة المنتج</button>

<h3>المنتجات</h3>

<div id="products"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://zspikbjjwdnsnzxlqueq.supabase.co"

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzcGlrYmpqd2Ruc256eGxxdWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzUyMDIsImV4cCI6MjA4ODkxMTIwMn0.9PErcgM0GhEqB4d3qucoaO7HgmpilFdrvURpBbqpwsI"

const { createClient } = supabase

const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY)


async function addProduct(){

const name = document.getElementById("name").value
const barcode = document.getElementById("barcode").value
const price = document.getElementById("price").value

if(!name || !barcode || !price){
alert("الرجاء إدخال جميع البيانات")
return
}

await supabaseClient
.from("products")
.insert([
{
name:name,
barcode:barcode,
price:price
}
])

document.getElementById("name").value=""
document.getElementById("barcode").value=""
document.getElementById("price").value=""

loadProducts()

}


async function loadProducts(){

const { data } = await supabaseClient
.from("products")
.select("*")

const container = document.getElementById("products")

container.innerHTML=""

data.forEach(p=>{

container.innerHTML += `
<div class="product">
<b>${p.name}</b><br>
Barcode: ${p.barcode}<br>
Price: ${p.price}
</div>
`

})

}


loadProducts()

</script>

</body>
</html>
