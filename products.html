<!DOCTYPE html>

<html lang="ar">

<head>
<meta charset="UTF-8">
<title>إدارة المنتجات</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#0f172a;
color:white;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

input{
padding:12px;
border:none;
border-radius:6px;
margin:5px;
width:180px;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
margin:5px;
background:#22c55e;
color:white;
}

.product{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>إدارة المنتجات</h1>

<h3>إضافة منتج</h3>

<input id="name" placeholder="اسم المنتج">
<input id="barcode" placeholder="الباركود">
<input id="price" placeholder="السعر">
<input id="category" placeholder="التصنيف">

<button onclick="addProduct()">إضافة المنتج</button>

<h3>المنتجات</h3>

<div id="products"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL="https://zspikbjjwdnsnzxlqueq.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzcGlrYmpqd2Ruc256eGxxdWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzUyMDIsImV4cCI6MjA4ODkxMTIwMn0.9PErcgM0GhEqB4d3qucoaO7HgmpilFdrvURpBbqpwsI"

const supabaseClient = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

loadProducts()

async function loadProducts(){

const { data } = await supabaseClient
.from("products")
.select("*")

let container=document.getElementById("products")
container.innerHTML=""

data.forEach(p=>{

container.innerHTML+=`

<div class="product">

<b>${p.name}</b><br>
Barcode: ${p.barcode}<br>
Price: ${p.price}<br>
Category: ${p.category}

</div>

`

})

}

async function addProduct(){

let name=document.getElementById("name").value
let barcode=document.getElementById("barcode").value
let price=document.getElementById("price").value
let category=document.getElementById("category").value

await supabaseClient
.from("products")
.insert([
{
name:name,
barcode:barcode,
price:Number(price),
category:category
}
])

loadProducts()

}

</script>

</body>
</html>
