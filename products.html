<!DOCTYPE html>

<html lang="ar">

<head>
<meta charset="UTF-8">
<title>إدارة المنتجات</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#0f172a;
color:white;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

input{
padding:10px;
border:none;
border-radius:6px;
margin:5px;
width:150px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
margin:5px;
}

.add{background:#22c55e;color:white;}
.edit{background:#3b82f6;color:white;}
.delete{background:#ef4444;color:white;}

.product{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>إدارة المنتجات</h1>

<h3>إضافة منتج</h3>

<input id="name" placeholder="اسم المنتج">
<input id="barcode" placeholder="الباركود">
<input id="price" placeholder="السعر">
<input id="category" placeholder="التصنيف">

<button class="add" onclick="addProduct()">إضافة المنتج</button>

<h3>المنتجات</h3>

<div id="products"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL="https://zspikbjjwdnsnzxlqueq.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzcGlrYmpqd2Ruc256eGxxdWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzUyMDIsImV4cCI6MjA4ODkxMTIwMn0.9PErcgM0GhEqB4d3qucoaO7HgmpilFdrvURpBbqpwsI"

const supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

loadProducts()

async function loadProducts(){

const { data } = await supabase
.from("products")
.select("*")

let container=document.getElementById("products")
container.innerHTML=""

data.forEach(p=>{

container.innerHTML+=`

<div class="product">

<input id="name-${p.id}" value="${p.name}">
<input id="barcode-${p.id}" value="${p.barcode}">
<input id="price-${p.id}" value="${p.price}">
<input id="category-${p.id}" value="${p.category}">

<br>

<button class="edit" onclick="updateProduct('${p.id}')">تعديل</button>

<button class="delete" onclick="deleteProduct('${p.id}')">حذف</button>

</div>

`

})

}

async function addProduct(){

let name=document.getElementById("name").value
let barcode=document.getElementById("barcode").value
let price=document.getElementById("price").value
let category=document.getElementById("category").value

await supabase
.from("products")
.insert([{name,barcode,price:Number(price),category}])

loadProducts()

}

async function updateProduct(id){

let name=document.getElementById("name-"+id).value
let barcode=document.getElementById("barcode-"+id).value
let price=document.getElementById("price-"+id).value
let category=document.getElementById("category-"+id).value

await supabase
.from("products")
.update({
name:name,
barcode:barcode,
price:Number(price),
category:category
})
.eq("id",id)

loadProducts()

}

async function deleteProduct(id){

await supabase
.from("products")
.delete()
.eq("id",id)

loadProducts()

}

</script>

</body>
</html>
